# fly.toml app configuration file generated for photo-api on 2026-04-30T13:11:14Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'photo-api'
primary_region = 'sin'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
